<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Enter your PIN to access the End of Day Report tool." />
<title>Enter PIN · End of Day Report</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#0a0a0b" />
<link rel="stylesheet" href="style.css" />
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('eodTheme') || 'dark');
</script>
<style>
  .pin-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .pin-card {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .pin-card .mark {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--chrome-1), var(--chrome-3));
    color: var(--ink-on-silver);
    box-shadow: var(--shadow-mark);
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pin-card .mark svg { width: 24px; height: 24px; }
  .pin-card h1 {
    font-size: 20px;
    margin: 0 0 6px;
  }
  .pin-card p.sub {
    margin: 0 0 22px;
    text-align: center;
  }
  #pinInput {
    width: 100%;
    text-align: center;
    letter-spacing: 0.5em;
    font-size: 28px;
    font-weight: 700;
    padding: 16px 12px 16px 20px;
  }
  #pinSubmitBtn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: linear-gradient(135deg, var(--chrome-1), var(--chrome-2));
    color: var(--ink-on-silver);
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow-btn);
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
  }
  #pinSubmitBtn:hover { transform: translateY(-1px); box-shadow: var(--shadow-btn-hover); }
  #pinSubmitBtn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  #pinError {
    display: none;
    color: var(--danger-ink);
    background: var(--danger-bg);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13.5px;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="card pin-card">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Enter PIN</h1>
    <p class="sub">This tool is limited to store staff. Enter your PIN to continue.</p>

    <form id="pinForm" autocomplete="off">
      <input
        id="pinInput"
        type="tel"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="one-time-code"
        maxlength="8"
        placeholder="••••"
        autofocus
      />
      <button id="pinSubmitBtn" type="submit">Unlock</button>
    </form>
    <div id="pinError"></div>
  </div>
</div>

<script>
const pinForm = document.getElementById('pinForm');
const pinInput = document.getElementById('pinInput');
const pinSubmitBtn = document.getElementById('pinSubmitBtn');
const pinError = document.getElementById('pinError');

pinInput.focus();

function showError(msg) {
  pinError.textContent = msg;
  pinError.style.display = 'block';
}
function hideError() {
  pinError.style.display = 'none';
}

function safeNextPath() {
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next');
  if (next && next.startsWith('/') && !next.startsWith('//')) return next;
  return '/';
}

pinForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const pin = pinInput.value.trim();
  if (!pin) return;

  pinSubmitBtn.disabled = true;
  pinSubmitBtn.textContent = 'Checking...';

  try {
    const res = await fetch('/api/pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Incorrect PIN. Please try again.');
      pinInput.value = '';
      pinInput.focus();
      return;
    }

    window.location.href = safeNextPath();
  } catch (err) {
    showError('Could not reach the server. Please try again.');
  } finally {
    pinSubmitBtn.disabled = false;
    pinSubmitBtn.textContent = 'Unlock';
  }
});
</script>
</body>
</html>
